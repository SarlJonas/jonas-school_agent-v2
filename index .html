<div id="root"></div>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<style>
  :root{
    --navy:#0B1F3A; --navy2:#12325C; --gold:#D4AF37; --gold-d:#B8941F;
    --cream:#FAF7F0; --ink:#1A2233; --grey:#5A6577; --line:#E4DECB;
    --good:#2E9E5B; --bad:#D9534F;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  #root{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    color:var(--ink); min-height:100vh;
    background:radial-gradient(circle at 50% -10%, #15335c 0%, var(--navy) 55%) fixed;
    display:flex; justify-content:center; align-items:flex-start;
    padding:18px 14px 40px;
  }
  .card{
    width:100%; max-width:560px; background:var(--cream);
    border-radius:22px; overflow:hidden;
    box-shadow:0 22px 60px rgba(0,0,0,.45);
  }
  .topbar{
    background:var(--navy); padding:20px 22px 18px; text-align:center; position:relative;
  }
  .topbar img{width:104px; height:104px; object-fit:contain; filter:drop-shadow(0 4px 10px rgba(0,0,0,.3));
    background:#fff; border-radius:18px; padding:6px;}
  .kicker{color:var(--gold); font-size:11px; letter-spacing:3px; font-weight:800; margin-top:12px;}
  .ttl{color:#fff; font-size:23px; font-weight:800; margin-top:4px; line-height:1.15;}
  .sub{color:#CFE0F5; font-size:12.5px; margin-top:6px;}
  .body{padding:24px 22px 26px;}

  /* progress */
  .prog-wrap{display:flex; align-items:center; gap:10px; margin-bottom:18px;}
  .prog-bar{flex:1; height:9px; background:#e7e0cf; border-radius:99px; overflow:hidden;}
  .prog-fill{height:100%; width:0; background:linear-gradient(90deg,var(--gold-d),var(--gold)); border-radius:99px; transition:width .35s ease;}
  .prog-txt{font-size:12.5px; font-weight:800; color:var(--navy); white-space:nowrap;}

  .q-num{color:var(--gold-d); font-weight:800; font-size:12px; letter-spacing:2px; text-transform:uppercase;}
  .q-text{font-size:20px; font-weight:800; color:var(--navy); margin:8px 0 18px; line-height:1.3;}

  .opt{
    display:flex; align-items:flex-start; gap:12px; width:100%; text-align:left;
    background:#fff; border:1.6px solid var(--line); border-radius:14px;
    padding:14px 15px; margin-bottom:11px; cursor:pointer; font-size:15.5px; color:var(--ink);
    transition:all .15s ease; line-height:1.35;
  }
  .opt:hover:not(:disabled){border-color:var(--gold); transform:translateY(-1px);}
  .opt .lt{
    flex:0 0 26px; height:26px; border-radius:8px; background:var(--navy); color:#fff;
    font-weight:800; font-size:13px; display:flex; align-items:center; justify-content:center;
  }
  .opt.correct{border-color:var(--good); background:#EAF7EF;}
  .opt.correct .lt{background:var(--good);}
  .opt.wrong{border-color:var(--bad); background:#FBECEB;}
  .opt.wrong .lt{background:var(--bad);}
  .opt:disabled{cursor:default;}

  .expl{
    background:#EEF3FA; border-radius:12px; padding:13px 15px; font-size:14px; color:#33425a;
    margin-top:4px; line-height:1.45; animation:fade .3s ease;
  }
  .expl b{color:var(--navy);}
  @keyframes fade{from{opacity:0; transform:translateY(4px);}to{opacity:1; transform:none;}}

  .btn{
    width:100%; border:none; border-radius:14px; padding:15px; font-size:16px; font-weight:800;
    cursor:pointer; margin-top:16px; transition:transform .12s ease, opacity .2s;
  }
  .btn:active{transform:scale(.985);}
  .btn-gold{background:linear-gradient(90deg,var(--gold-d),var(--gold)); color:var(--navy);}
  .btn-navy{background:var(--navy); color:#fff;}
  .btn-ghost{background:transparent; color:var(--navy); border:1.6px solid var(--navy);}
  .btn:disabled{opacity:.45; cursor:default;}

  .field{margin-bottom:14px;}
  .field label{display:block; font-size:13px; font-weight:700; color:var(--navy); margin-bottom:6px;}
  .field input{
    width:100%; padding:14px 15px; border:1.6px solid var(--line); border-radius:14px;
    font-size:16px; background:#fff; color:var(--ink);
  }
  .field input:focus{outline:none; border-color:var(--gold);}
  .hint{font-size:12px; color:var(--grey); margin-top:6px;}

  .intro-list{margin:16px 0 4px;}
  .intro-list div{display:flex; gap:10px; align-items:center; font-size:14.5px; color:var(--ink); margin-bottom:9px;}
  .dot{flex:0 0 9px; height:9px; border-radius:99px; background:var(--gold-d);}

  /* result */
  .score-ring{width:150px; height:150px; margin:6px auto 8px; position:relative;}
  .score-ring .num{position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center;}
  .score-ring .num b{font-size:40px; color:var(--navy); line-height:1;}
  .score-ring .num span{font-size:13px; color:var(--grey); font-weight:700;}
  .badge{display:inline-block; padding:7px 16px; border-radius:99px; font-weight:800; font-size:14px; margin:6px 0 4px;}
  .res-msg{font-size:14.5px; color:var(--ink); line-height:1.5; margin:10px 4px 6px;}

  .tabs{display:flex; gap:8px; margin:18px 0 14px;}
  .tab{flex:1; padding:10px; border-radius:11px; border:1.6px solid var(--line); background:#fff;
    font-weight:800; font-size:13.5px; color:var(--navy); cursor:pointer;}
  .tab.active{background:var(--navy); color:#fff; border-color:var(--navy);}

  .lb-row{display:flex; align-items:center; gap:12px; padding:11px 13px; background:#fff;
    border:1.4px solid var(--line); border-radius:12px; margin-bottom:8px;}
  .lb-rank{flex:0 0 30px; height:30px; border-radius:9px; background:var(--cream); color:var(--navy);
    font-weight:800; display:flex; align-items:center; justify-content:center; font-size:14px;}
  .lb-row.me{border-color:var(--gold); background:#FFFBEF;}
  .lb-rank.g1{background:var(--gold); color:var(--navy);}
  .lb-rank.g2{background:#C9CDD4; color:var(--navy);}
  .lb-rank.g3{background:#E2B98A; color:var(--navy);}
  .lb-name{flex:1; font-weight:700; font-size:14.5px; color:var(--navy); overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .lb-score{font-weight:800; color:var(--gold-d); font-size:15px;}
  .lb-empty{text-align:center; color:var(--grey); font-size:13.5px; padding:18px 0;}

  .promo{background:var(--navy); border-radius:16px; padding:18px; margin-top:18px; text-align:center;}
  .promo .h{color:var(--gold); font-weight:800; font-size:17px;}
  .promo .p{color:#DDE8F5; font-size:13px; margin-top:6px; line-height:1.5;}
  .promo .tt{color:#fff; font-weight:800; font-size:15px; margin-top:10px;}

  .footer{text-align:center; font-size:11.5px; color:var(--grey); padding:14px; line-height:1.6;}
  .footer b{color:var(--navy);}
  .loading{text-align:center; color:var(--grey); font-size:13.5px; padding:14px;}
</style>
